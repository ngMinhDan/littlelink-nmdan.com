<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today I Learned</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fafafa;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.14);
  --text: #0d0d0d;
  --muted: #737373;
  --subtle: #a3a3a3;
  --accent: #16a34a;
  --accent-bg: #f0fdf4;
  --tag-bg: #f5f5f5;
  --tag-text: #525252;
  --sans: 'Geist', -apple-system, sans-serif;
  --mono: 'Geist Mono', monospace;
  --r: 8px;
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.site-header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  position: sticky;
  top: 0;
  background: rgba(250,250,250,0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 100;
}

.header-inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-title {
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.site-title-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

nav { display: flex; gap: 2px; }

nav button {
  background: none;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
  font-weight: 400;
}

nav button:hover { background: var(--tag-bg); color: var(--text); }
nav button.active { background: var(--tag-bg); color: var(--text); font-weight: 500; }

/* ── LAYOUT ── */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 24px 96px;
}

.page { display: none; }
.page.active { display: block; }

/* ── PAGE HEADING ── */
.page-heading {
  margin-bottom: 32px;
}

.page-heading h2 {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}

.page-heading p {
  font-size: 0.8rem;
  color: var(--text);
}

/* ── TAG FILTER ── */
.tag-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 28px;
}

.tag-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 0.75rem;
  font-family: var(--sans);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
}

.tag-btn:hover { border-color: var(--border-hover); color: var(--text); }
.tag-btn.active { background: var(--text); color: white; border-color: var(--text); }

/* ── POST LIST ── */
.posts-list { display: flex; flex-direction: column; }

.post-card {
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: opacity 0.12s;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 16px;
  align-items: start;
}

.post-card:first-child { border-top: 1px solid var(--border); }
.post-card:hover { opacity: 0.7; }

.post-date-col {
  text-align: center;
  padding-top: 1px;
}

.post-day {
  font-size: 1.3rem;
  font-weight: 300;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.02em;
}

.post-month {
  font-size: 0.65rem;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 2px;
  font-family: var(--mono);
}

.post-body {}

.post-title {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.01em;
  line-height: 1.4;
}

.post-summary {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: 10px;
}

.post-tags { display: flex; flex-wrap: wrap; gap: 5px; }

.post-tag {
  background: var(--tag-bg);
  color: var(--tag-text);
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
}

/* ── SINGLE POST ── */
.back-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 0;
  margin-bottom: 40px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.12s;
  letter-spacing: 0;
}

.back-btn:hover { color: var(--text); }

.post-full-date {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--subtle);
  margin-bottom: 10px;
}

.post-full-title {
  font-size: 1.5rem;
  font-weight: 500;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: -0.02em;
}

.post-full-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}

.post-full-tag {
  background: var(--accent-bg);
  color: var(--accent);
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: var(--mono);
}

.post-full-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 32px;
}

/* Markdown content */
.post-content {
  font-size: 0.9rem;
  line-height: 1.85;
  color: #1a1a1a;
}

.post-content h2 {
  font-size: 1rem;
  font-weight: 500;
  margin: 32px 0 10px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.post-content h3 {
  font-size: 0.875rem;
  font-weight: 500;
  margin: 20px 0 8px;
  color: var(--text);
}

.post-content p { margin-bottom: 14px; }

.post-content ul, .post-content ol {
  padding-left: 18px;
  margin-bottom: 14px;
}

.post-content li { margin-bottom: 5px; }

.post-content code {
  background: var(--tag-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 0.82em;
  font-family: var(--mono);
}

.post-content pre {
  background: #111;
  color: #e5e5e5;
  border-radius: var(--r);
  padding: 16px 20px;
  overflow-x: auto;
  margin-bottom: 16px;
  font-size: 0.8rem;
  line-height: 1.65;
}

.post-content pre code {
  background: none;
  border: none;
  padding: 0;
  color: inherit;
  font-size: inherit;
}

/* ── STATS ── */
.stats-counters {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 44px;
}

.counter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px;
}

.counter-num {
  font-size: 1.8rem;
  font-weight: 400;
  color: var(--text);
  letter-spacing: -0.03em;
  line-height: 1;
  margin-bottom: 5px;
}

.counter-label {
  font-size: 0.75rem;
  color: var(--text);
  margin-top: 4px;
}

/* Calendar */
.section-label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 14px;
}

.calendar-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 40px;
  overflow-x: auto;
}

.calendar-months {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px 20px;
}

.cal-month-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7, 22px);
  gap: 2px;
  margin-bottom: 2px;
}

.cal-wd {
  font-size: 0.62rem;
  color: var(--text);
  text-align: center;
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 22px);
  gap: 2px;
}

.cal-day {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: var(--text);
  transition: all 0.1s;
}

.cal-day.has-post {
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-weight: 500;
}

.cal-day.has-post:hover { opacity: 0.8; }

.cal-day.today {
  border: 1px solid var(--border-hover);
  color: var(--text);
  font-weight: 500;
}

.cal-day.today.has-post { border: none; color: white; }
.cal-day.out-of-range { opacity: 0.2; }

/* Tags cloud */
.tags-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag-cloud-item {
  display: flex;
  align-items: center;
  gap: 7px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.12s;
  background: var(--surface);
}

.tag-cloud-item:hover { border-color: var(--border-hover); }

.tag-cloud-name {
  font-size: 0.8rem;
  color: var(--text);
}

.tag-cloud-count {
  font-size: 0.75rem;
  color: var(--text);
}

/* ── EMPTY ── */
.empty {
  padding: 60px 0;
  color: var(--muted);
  font-size: 0.85rem;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  main { padding: 32px 16px 72px; }
  .header-inner { padding: 0 16px; }
  .post-full-title { font-size: 1.2rem; }
  .stats-counters { gap: 8px; }
  .counter-num { font-size: 1.5rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title" onclick="showPage('posts')">
      <span class="site-title-dot"></span>
      Today I Learned
    </div>
    <nav>
      <button id="nav-posts" class="active" onclick="showPage('posts')">Posts</button>
      <button id="nav-stats" onclick="showPage('stats')">Stats</button>
    </nav>
  </div>
</header>

<main>

  <!-- POSTS -->
  <div id="page-posts" class="page active">
    <div class="page-heading">
      <h2 id="posts-heading">All posts</h2>
      <p id="posts-subheading"></p>
    </div>
    <div id="tag-filter-bar" class="tag-filter"></div>
    <div id="posts-list" class="posts-list"></div>
  </div>

  <!-- SINGLE -->
  <div id="page-single" class="page">
    <button class="back-btn" onclick="showPage('posts')">← Back</button>
    <div id="single-post-content"></div>
  </div>

  <!-- STATS -->
  <div id="page-stats" class="page">
    <div class="page-heading">
      <h2>Stats</h2>
      <p id="stats-sub"></p>
    </div>

    <div class="stats-counters">
      <div class="counter-card">
        <div class="counter-num" id="cnt-posts">0</div>
        <div class="counter-label">Posts</div>
      </div>
      <div class="counter-card">
        <div class="counter-num" id="cnt-streak">0</div>
        <div class="counter-label">Streak</div>
      </div>
      <div class="counter-card">
        <div class="counter-num" id="cnt-tags">0</div>
        <div class="counter-label">Topics</div>
      </div>
    </div>

    <div class="section-label">Learning calendar</div>
    <div class="calendar-wrap">
      <div id="calendar-months" class="calendar-months"></div>
    </div>

    <div class="section-label" style="margin-bottom: 14px;">Topics</div>
    <div id="tags-cloud" class="tags-cloud"></div>
  </div>

</main>

<script src="data.js"></script>
<script>
let activeTag = null;

function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }

function fmtFull(s) {
  return parseDate(s).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function fmtDay(s) { return parseDate(s).getDate(); }

function fmtMon(s) {
  return parseDate(s).toLocaleDateString('en-US', { month:'short' }).toUpperCase();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function md(raw) {
  let h = raw.trim();
  h = h.replace(/```[\w]*\n([\s\S]*?)```/g, (_,c) => `<pre><code>${escHtml(c.trim())}</code></pre>`);
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm,'<h2>$1</h2>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/^([\-\*] .+(\n[\-\*] .+)*)/gm, match => {
    const items = match.split('\n').map(l=>l.replace(/^[\-\*] /,'').trim()).filter(Boolean).map(l=>`<li>${l}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  h = h.split(/\n\n+/).map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<(h[1-6]|ul|ol|pre)/.test(b)) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  return h;
}

function getAllTags() {
  const c = {};
  BLOG_DATA.posts.forEach(p => (p.tags||[]).forEach(t => { c[t]=(c[t]||0)+1; }));
  return c;
}

function showPage(page, id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  if (page === 'posts') {
    document.getElementById('page-posts').classList.add('active');
    document.getElementById('nav-posts').classList.add('active');
    renderPosts();
  } else if (page === 'stats') {
    document.getElementById('page-stats').classList.add('active');
    document.getElementById('nav-stats').classList.add('active');
    renderStats();
  } else if (page === 'single') {
    document.getElementById('page-single').classList.add('active');
    document.getElementById('nav-posts').classList.add('active');
    renderSingle(id);
    window.scrollTo(0,0);
  }
}

function renderPosts() {
  const counts = getAllTags();
  const bar = document.getElementById('tag-filter-bar');
  bar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'tag-btn' + (activeTag===null?' active':'');
  all.textContent = 'All';
  all.onclick = () => { activeTag=null; renderPosts(); };
  bar.appendChild(all);
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([tag,n]) => {
    const b = document.createElement('button');
    b.className = 'tag-btn' + (activeTag===tag?' active':'');
    b.textContent = `${tag} · ${n}`;
    b.onclick = () => { activeTag=tag; renderPosts(); };
    bar.appendChild(b);
  });

  const sorted = [...BLOG_DATA.posts].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered = activeTag ? sorted.filter(p=>(p.tags||[]).includes(activeTag)) : sorted;

  document.getElementById('posts-heading').textContent = activeTag ? `#${activeTag}` : 'All posts';
  document.getElementById('posts-subheading').textContent = `I want to learn something new every day. This is a log of what I've learned so far. And, share it with you.`;

  const list = document.getElementById('posts-list');
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No posts yet.</div>';
    return;
  }
  filtered.forEach(post => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-date-col">
        <div class="post-day">${fmtDay(post.date)}</div>
        <div class="post-month">${fmtMon(post.date)}</div>
      </div>
      <div class="post-body">
        <div class="post-title">${post.title}</div>
        <div class="post-summary">${post.summary}</div>
        <div class="post-tags">${(post.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
      </div>`;
    card.onclick = () => showPage('single', post.id);
    list.appendChild(card);
  });
}

function parseFrontmatter(raw) {
  // Strip ---frontmatter--- block and return body only
  const match = raw.match(/^---[\s\S]*?---\n([\s\S]*)$/);
  return match ? match[1].trim() : raw.trim();
}

async function renderSingle(id) {
  const post = BLOG_DATA.posts.find(p=>p.id===id);
  if (!post) return;

  const container = document.getElementById('single-post-content');

  // Render header immediately, show loading for body
  container.innerHTML = `
    <div class="post-full-date">${fmtFull(post.date)}</div>
    <h1 class="post-full-title">${post.title}</h1>
    <div class="post-full-tags">${(post.tags||[]).map(t=>`<span class="post-full-tag">${t}</span>`).join('')}</div>
    <div class="post-full-divider"></div>
    <div class="post-content" id="post-body"><span style="color:var(--muted);font-size:0.85rem">Loading...</span></div>`;

  if (post.file) {
    try {
      const res = await fetch(post.file);
      if (!res.ok) throw new Error('not found');
      const raw = await res.text();
      const body = parseFrontmatter(raw);
      document.getElementById('post-body').innerHTML = md(body);
    } catch(e) {
      document.getElementById('post-body').innerHTML =
        `<span style="color:var(--muted);font-size:0.85rem">Could not load <code>${post.file}</code>. Open via a local server (e.g. <code>npx serve .</code>).</span>`;
    }
  } else if (post.content) {
    document.getElementById('post-body').innerHTML = md(post.content);
  }
}

function calcStreak() {
  const dates = new Set(BLOG_DATA.posts.map(p=>p.date));
  const today = new Date(); today.setHours(0,0,0,0);
  let s=0, d=new Date(today);
  while (true) {
    if (dates.has(d.toISOString().slice(0,10))) { s++; d.setDate(d.getDate()-1); }
    else break;
  }
  return s;
}

function renderStats() {
  const posts = BLOG_DATA.posts;
  const tags = getAllTags();
  document.getElementById('cnt-posts').textContent = posts.length;
  document.getElementById('cnt-streak').textContent = calcStreak();
  document.getElementById('cnt-tags').textContent = Object.keys(tags).length;

  const start = parseDate(BLOG_DATA.startDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Math.floor((today-start)/86400000)+1;
  document.getElementById('stats-sub').textContent = `${days} days since June 6, 2026`;

  renderCalendar(posts);

  const cloud = document.getElementById('tags-cloud');
  cloud.innerHTML = '';
  Object.entries(tags).sort((a,b)=>b[1]-a[1]).forEach(([tag,n]) => {
    const el = document.createElement('div');
    el.className = 'tag-cloud-item';
    el.innerHTML = `<span class="tag-cloud-name">${tag}</span><span class="tag-cloud-count">${n}</span>`;
    el.onclick = () => { activeTag=tag; showPage('posts'); };
    cloud.appendChild(el);
  });
}

function renderCalendar(posts) {
  const postDates = new Set(posts.map(p=>p.date));
  const byDate = {};
  posts.forEach(p=>{ byDate[p.date]=p; });

  const startDate = parseDate(BLOG_DATA.startDate);
  const today = new Date(); today.setHours(0,0,0,0);

  const months = [];
  let cur = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const endM = new Date(2026, 11, 1); // December 2026
  while (cur <= endM) { months.push(new Date(cur)); cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1); }

  const container = document.getElementById('calendar-months');
  container.innerHTML = '';
  const WD = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  months.forEach(ms => {
    const y=ms.getFullYear(), m=ms.getMonth();
    const label = ms.toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const wrap = document.createElement('div');

    const ml = document.createElement('div');
    ml.className = 'cal-month-label';
    ml.textContent = label;
    wrap.appendChild(ml);

    const wdRow = document.createElement('div');
    wdRow.className = 'cal-weekdays';
    WD.forEach(w => { const el=document.createElement('div'); el.className='cal-wd'; el.textContent=w; wdRow.appendChild(el); });
    wrap.appendChild(wdRow);

    const grid = document.createElement('div');
    grid.className = 'cal-days';

    const firstDow = new Date(y,m,1).getDay();
    for (let i=0;i<firstDow;i++) { const b=document.createElement('div'); grid.appendChild(b); }

    const daysInM = new Date(y,m+1,0).getDate();
    for (let d=1;d<=daysInM;d++) {
      const dd = new Date(y,m,d);
      const ds = dd.toISOString().slice(0,10);
      const isFuture = dd > today;
      const isOOR = dd < startDate || isFuture;
      const hasPost = postDates.has(ds);
      const isToday = dd.getTime()===today.getTime();

      const cell = document.createElement('div');
      cell.className = 'cal-day';
      if (isOOR) cell.classList.add('out-of-range');
      if (hasPost) cell.classList.add('has-post');
      if (isToday) cell.classList.add('today');
      cell.textContent = d;
      if (hasPost) {
        cell.title = byDate[ds].title;
        cell.onclick = () => showPage('single', byDate[ds].id);
      }
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    container.appendChild(wrap);
  });
}

renderPosts();
</script>
</body>
</html>
